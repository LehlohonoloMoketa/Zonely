<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Timezone Clock Application</title>\n    <style>\n        body { font-family: Arial, sans-serif; background-color: #f4f4f4; text-align: center; padding: 50px; }\n        .clock { display: inline-block; margin: 20px; padding: 10px; border: 1px solid #ccc; border-radius: 10px; background-color: white; }\n        select, button { margin: 10px; padding: 10px; cursor: pointer; }\n    </style>\n</head>\n<body>\n    <h1>Timezone Clock Application</h1>\n    <div>\n        <label for="timezone">Select Timezone:</label>\n        <select id="timezone"></select>\n        <button id="toggleFormat">Toggle 12/24 Hour Format</button>\n    </div>\n    <div id="clocks"></div>\n    <script>\n        const timeZones = [\n            'UTC',\n            'America/New_York',\n            'Europe/London',\n            'Asia/Tokyo',\n            'Australia/Sydney'\n        ];\n        const clocksDiv = document.getElementById('clocks');\n        const timezoneSelect = document.getElementById('timezone');\n        let is24HourFormat = true;\n\n        // Populate timezone dropdown\n        timeZones.forEach(tz => {\n            const option = document.createElement('option');\n            option.value = tz;\n            option.textContent = tz;\n            timezoneSelect.appendChild(option);\n        });\n\n        const updateClocks = () => {\n            clocksDiv.innerHTML = '';\n            timeZones.forEach(tz => {\n                const date = new Date();\n                const utcDate = date.toLocaleString('en-US', { timeZone: tz });\n                const formatOptions = { hour: 'numeric', minute: 'numeric', second: 'numeric', hour12: !is24HourFormat };\n                const formattedTime = new Date(utcDate).toLocaleTimeString('en-US', formatOptions);\n                const clockDiv = document.createElement('div');\n                clockDiv.className = 'clock';\n                clockDiv.innerHTML = `<strong>${tz}</strong>: ${formattedTime}`;\n                clocksDiv.appendChild(clockDiv);\n            });\n        };\n\n        timezoneSelect.addEventListener('change', updateClocks);\n        document.getElementById('toggleFormat').addEventListener('click', () => {\n            is24HourFormat = !is24HourFormat;\n            updateClocks();\n        });\n\n        setInterval(updateClocks, 1000);\n        updateClocks();\n    </script>\n</body>\n</html>
